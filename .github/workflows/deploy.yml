# Build the single-file app and publish it to GitHub Pages.
# Served at https://gentropic.org/paiol/ (project Pages under the org's custom domain).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # build.js is pure Node (no dependencies) — no install step needed.
      - name: Build single-file app
        run: |
          node build.js
          mkdir -p _site
          cp paiol.html _site/index.html
          # PWA sidecars: service worker (generated by build.js) + manifest + icons (committed).
          cp sw.js manifest.webmanifest icon-192.png icon-512.png apple-touch-icon.png _site/
          # pdf-lib (lazy-loaded sidecar for PDF generation) — preserve the vendor/ path.
          mkdir -p _site/vendor/pdf-lib && cp vendor/pdf-lib/pdf-lib.min.js _site/vendor/pdf-lib/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
