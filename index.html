<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#9a4a2f" />
  <title>Quitutes do Paiol</title>
  <style>
    /* Phone-first; warm confeitaria palette. Tokens mirror the GCU --au-* roles loosely so we
       can swap in @gcu/switchboard later without touching markup. */
    :root {
      --au-bg: #fbf6f0;
      --au-surface: #ffffff;
      --au-fg: #2a211c;
      --au-fg-soft: #6b5d54;
      --au-border: #ece0d5;
      --au-action: #9a4a2f;     /* terracotta */
      --au-action-fg: #ffffff;
      --au-ok: #2f7d4f;
      --au-radius: 12px;
      --au-shadow: 0 1px 3px rgba(60, 40, 30, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--au-bg); color: var(--au-fg);
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #app { max-width: 640px; margin: 0 auto; padding: 16px 16px calc(72px + env(safe-area-inset-bottom)); }

    .pa-header { padding: 8px 4px 16px; }
    .pa-header h1 { margin: 0; font-size: 1.5rem; color: var(--au-action); }
    .pa-sub { margin: 2px 0 0; color: var(--au-fg-soft); font-size: 0.9rem; }

    .pa-card { background: var(--au-surface); border: 1px solid var(--au-border);
      border-radius: var(--au-radius); box-shadow: var(--au-shadow); padding: 16px; margin: 0 0 16px; }
    .pa-card h2 { margin: 0 0 12px; font-size: 1.15rem; }

    .pa-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .pa-row + .pa-row { margin-top: 10px; }
    .pa-form { margin-top: 14px; }

    .pa-badge { font-size: 0.78rem; padding: 2px 8px; border-radius: 999px;
      background: var(--au-border); color: var(--au-fg-soft); margin-left: auto; }
    .pa-badge.pa-ok { background: #e3f2e8; color: var(--au-ok); }

    .pa-btn { font: inherit; font-size: 0.95rem; padding: 9px 14px; border-radius: 10px;
      border: 1px solid var(--au-border); background: var(--au-surface); color: var(--au-fg); cursor: pointer; }
    .pa-btn:active { transform: translateY(1px); }
    .pa-btn[disabled] { opacity: 0.55; cursor: default; }
    .pa-primary { background: var(--au-action); color: var(--au-action-fg); border-color: var(--au-action); }
    .pa-ghost { background: transparent; border-color: transparent; color: var(--au-fg-soft); }
    .pa-sm { padding: 4px 8px; font-size: 0.85rem; }

    .pa-input { font: inherit; padding: 9px 11px; border: 1px solid var(--au-border);
      border-radius: 10px; background: var(--au-surface); color: var(--au-fg); flex: 1 1 auto; min-width: 0; }
    select.pa-input { flex: 0 0 auto; }

    .pa-list { list-style: none; margin: 0; padding: 0; }
    .pa-list-item { display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 10px 4px; border-bottom: 1px solid var(--au-border); }
    .pa-list-item:last-child { border-bottom: none; }
    .pa-empty { color: var(--au-fg-soft); font-style: italic; margin: 4px 0; }
    /* Date header inside an operação log (Fornadas/Vendas) */
    .pa-daygroup { list-style: none; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--au-fg-soft); padding: 12px 4px 2px; }
    .pa-daygroup:first-child { padding-top: 2px; }
    .pa-status { margin: 10px 0 0; font-size: 0.88rem; color: var(--au-fg-soft); }

    /* Bottom tab bar (iOS-native) */
    .pa-bottomnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%;
      max-width: 640px; display: flex; background: var(--au-surface); border-top: 1px solid var(--au-border);
      box-shadow: 0 -1px 6px rgba(60, 40, 30, 0.06); padding-bottom: env(safe-area-inset-bottom); z-index: 10; }
    .pa-navbtn { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 2px 5px; border: none; background: none; color: var(--au-fg-soft); cursor: pointer; font: inherit; }
    .pa-navbtn.active { color: var(--au-action); background: #f6e9e1; }
    .pa-navbtn.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 36px; height: 3px; border-radius: 0 0 3px 3px; background: var(--au-action); }
    .pa-navico { font-size: 1.25rem; line-height: 1; }
    .pa-navlbl { font-size: 0.66rem; letter-spacing: 0.01em; }
    .pa-navbtn.active .pa-navlbl { font-weight: 700; }

    /* Segmented sub-nav (within a section) */
    .pa-seg { display: flex; gap: 6px; margin: 0 0 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .pa-segbtn { flex: 0 0 auto; font: inherit; font-size: 0.9rem; padding: 6px 14px; border: 1px solid var(--au-border);
      border-radius: 999px; background: var(--au-surface); color: var(--au-fg-soft); cursor: pointer; }
    .pa-segbtn.active { background: var(--au-action); color: var(--au-action-fg); border-color: var(--au-action); font-weight: 600; }

    /* Misc layout */
    .pa-grow { flex: 1 1 auto; min-width: 0; }
    .pa-muted { color: var(--au-fg-soft); font-size: 0.86rem; }
    .pa-narrow { flex: 0 0 auto; width: 7.5em; }
    .pa-hint { color: var(--au-fg-soft); font-size: 0.8rem; margin: 8px 0 0; }
    .pa-h3 { font-size: 1rem; margin: 18px 0 8px; color: var(--au-fg-soft); }
    .pa-lab { color: var(--au-fg-soft); font-size: 0.88rem; }
    .pa-form { flex-wrap: wrap; }

    .pa-sub-card { border: 1px solid var(--au-border); border-radius: 10px; padding: 12px; margin: 0 0 10px; background: #fffdfb; }
    .pa-list.pa-tight .pa-list-item { padding: 6px 2px; }

    .pa-field { display: flex; flex-direction: column; gap: 4px; margin: 0 0 12px; }
    .pa-field label { font-size: 0.88rem; color: var(--au-fg-soft); }
    .pa-field .pa-input { width: 100%; }

    /* Price breakdown */
    .pa-price { font-size: 1.2rem; font-weight: 700; color: var(--au-action); }
    .pa-kv { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.92rem; }
    .pa-kv td { padding: 4px 0; border-bottom: 1px solid var(--au-border); color: var(--au-fg-soft); }
    .pa-kv td.pa-num { text-align: right; font-variant-numeric: tabular-nums; color: var(--au-fg); }
    .pa-kv-total td { font-weight: 600; color: var(--au-fg); }
    .pa-kv tr:last-child td { border-bottom: none; }
    .pa-num.pa-strong { color: var(--au-action); font-weight: 700; }

    .pa-totals { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--au-border); }
    .pa-bad { color: #b3261e; }
    .pa-badge.pa-bad { background: #fbe3e1; color: #b3261e; }

    /* Lote 1: search, edit, history, observação */
    .pa-search { width: 100%; margin: 0 0 10px; }
    .pa-list-item.pa-stack { display: block; }
    .pa-editing { background: #fffaf3; border: 1px solid var(--au-action); }
    .pa-cardfoot { margin-top: 10px; justify-content: flex-end; }
    .pa-history { margin: 4px 0 0; }
    .pa-history summary { cursor: pointer; color: var(--au-fg-soft); font-size: 0.8rem; }
    .pa-history .pa-list-item { padding: 3px 0; }
    .pa-obs { white-space: pre-wrap; font-size: 0.88rem; color: var(--au-fg-soft); font-style: italic;
      margin: 2px 0 8px; padding-left: 8px; border-left: 2px solid var(--au-border); }
    textarea.pa-textarea { width: 100%; resize: vertical; font: inherit; min-height: 60px; }

    /* Cadastro lists: header with add button, clean tappable rows */
    .pa-cardhead { display: flex; align-items: center; gap: 8px; margin: 0 0 14px; }
    .pa-rows { margin: 0; }
    .pa-row-item { display: flex; align-items: center; gap: 8px; padding: 12px 4px; border-bottom: 1px solid var(--au-border); cursor: pointer; }
    .pa-row-item:last-child { border-bottom: none; }
    .pa-row-item:active { background: #faf3ec; }
    .pa-row-item .pa-muted { font-size: 0.85rem; }
    .pa-chev { color: var(--au-fg-soft); font-size: 1.4rem; line-height: 1; flex: 0 0 auto; }

    /* Currency input */
    .pa-money { display: flex; align-items: stretch; border: 1px solid var(--au-border); border-radius: 10px;
      background: var(--au-surface); overflow: hidden; }
    .pa-money:focus-within { border-color: var(--au-action); }
    .pa-money-pfx { display: flex; align-items: center; padding: 0 10px; background: #f6efe8; color: var(--au-fg-soft); font-size: 0.95rem; }
    .pa-money-input { flex: 1; min-width: 0; border: none; background: none; font: inherit; padding: 9px 11px; color: var(--au-fg); }
    .pa-money-input:focus { outline: none; }

    /* Bottom sheet / modal */
    .pa-backdrop { position: fixed; inset: 0; background: rgba(40, 26, 18, 0.45); z-index: 100;
      display: flex; align-items: flex-end; justify-content: center; }
    .pa-sheet { width: 100%; max-width: 640px; background: var(--au-surface); border-radius: 18px 18px 0 0;
      padding: 8px 18px calc(18px + env(safe-area-inset-bottom)); max-height: 88vh; overflow-y: auto;
      box-shadow: 0 -4px 24px rgba(40, 26, 18, 0.18); animation: pa-sheet-up 0.18s ease-out; }
    @keyframes pa-sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .pa-sheet-grab { width: 40px; height: 4px; border-radius: 999px; background: var(--au-border); margin: 4px auto 10px; }
    .pa-sheet-title { margin: 0 0 14px; font-size: 1.2rem; }
    .pa-sheet-msg { color: var(--au-fg-soft); margin: 0 0 18px; }
    .pa-sheet-body .pa-field:last-child { margin-bottom: 6px; }
    .pa-sheet-actions { display: flex; gap: 10px; margin-top: 4px; }
    .pa-sheet-danger { width: 100%; margin-top: 14px; }
    .pa-danger-btn { background: #b3261e; color: #fff; border-color: #b3261e; }

    /* Lote 2: Relatórios */
    .pa-chart { display: block; width: 100%; height: auto; margin: 6px 0 10px; }
    .pa-report td:first-child { color: var(--au-fg); }
    .pa-report td.pa-num { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
