<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3d526f" />
  <title>Quitutes do Paiol</title>

  <!-- PWA: installable, offline-capable (the service worker is registered from app.js). -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Paiol" />
  <style>
    /* Phone-first; warm confeitaria palette. Tokens mirror the GCU --au-* roles loosely so we
       can swap in @gcu/switchboard later without touching markup. */
    :root {
      --au-bg: #fbf6f0;
      --au-surface: #ffffff;
      --au-fg: #2a211c;
      --au-fg-soft: #6b5d54;
      --au-border: #ece0d5;
      --au-action: #9a4a2f;     /* terracotta */
      --au-action-fg: #ffffff;
      --au-ok: #2f7d4f;
      --au-radius: 12px;
      --au-shadow: 0 1px 3px rgba(60, 40, 30, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--au-bg); color: var(--au-fg);
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    #app { max-width: 640px; margin: 0 auto; padding: 16px 16px calc(72px + env(safe-area-inset-bottom)); }

    .pa-header { padding: 8px 4px 16px; display: flex; align-items: flex-start; gap: 8px; }
    .pa-header h1 { margin: 0; font-size: 1.5rem; color: var(--au-action); display: flex; align-items: baseline; gap: 7px; }
    .pa-beta { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--au-action);
      background: #f6e9e1; border: 1px solid #e6c3b3; border-radius: 999px; padding: 1px 7px; align-self: center; }
    .pa-sub { margin: 2px 0 0; color: var(--au-fg-soft); font-size: 0.9rem; }
    .pa-help-btn { flex: 0 0 auto; width: 38px; height: 38px; border-radius: 999px; border: 1px solid var(--au-border);
      background: var(--au-surface); color: var(--au-action); font-size: 1.15rem; font-weight: 700; cursor: pointer;
      box-shadow: var(--au-shadow); line-height: 1; }
    .pa-help-btn:active { transform: translateY(1px); }
    /* Help sheet content */
    .pa-help-det { border-bottom: 1px solid var(--au-border); padding: 6px 0; }
    .pa-help-det > summary { cursor: pointer; font-weight: 600; padding: 6px 2px; list-style: none;
      display: flex; align-items: center; gap: 8px; }
    .pa-help-det > summary::-webkit-details-marker { display: none; }
    .pa-help-det > summary::after { content: '›'; margin-left: auto; color: var(--au-fg-soft); font-size: 1.2rem; transition: transform 0.15s; }
    .pa-help-det[open] > summary::after { transform: rotate(90deg); }
    .pa-help-det .pa-badge { margin-left: 0; }
    .pa-help-p { margin: 4px 2px 8px; color: var(--au-fg-soft); font-size: 0.92rem; }
    /* "New version available" banner (PWA update) */
    .pa-update { display: flex; align-items: center; gap: 8px; margin: 0 0 14px; padding: 10px 12px;
      background: #f6e9e1; border: 1px solid var(--au-action); border-radius: 10px; font-size: 0.92rem; color: var(--au-fg); }
    .pa-update .pa-btn { background: var(--au-action); color: var(--au-action-fg); border-color: var(--au-action); }

    .pa-card { background: var(--au-surface); border: 1px solid var(--au-border);
      border-radius: var(--au-radius); box-shadow: var(--au-shadow); padding: 16px; margin: 0 0 16px; }
    .pa-card h2 { margin: 0 0 12px; font-size: 1.15rem; }

    .pa-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .pa-row + .pa-row { margin-top: 10px; }
    .pa-form { margin-top: 14px; }

    .pa-badge { font-size: 0.78rem; padding: 2px 8px; border-radius: 999px;
      background: var(--au-border); color: var(--au-fg-soft); margin-left: auto; }
    .pa-badge.pa-ok { background: #e3f2e8; color: var(--au-ok); }

    .pa-btn { font: inherit; font-size: 0.95rem; padding: 9px 14px; border-radius: 10px;
      border: 1px solid var(--au-border); background: var(--au-surface); color: var(--au-fg); cursor: pointer; }
    .pa-btn:active { transform: translateY(1px); }
    .pa-btn[disabled] { opacity: 0.55; cursor: default; }
    .pa-primary { background: var(--au-action); color: var(--au-action-fg); border-color: var(--au-action); }
    .pa-ghost { background: transparent; border-color: transparent; color: var(--au-fg-soft); }
    .pa-sm { padding: 4px 8px; font-size: 0.85rem; }

    .pa-input { font: inherit; padding: 9px 11px; border: 1px solid var(--au-border);
      border-radius: 10px; background: var(--au-surface); color: var(--au-fg); flex: 1 1 auto; min-width: 0; }
    select.pa-input { flex: 0 0 auto; }

    .pa-list { list-style: none; margin: 0; padding: 0; }
    .pa-list-item { display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 10px 4px; border-bottom: 1px solid var(--au-border);
      content-visibility: auto; contain-intrinsic-size: auto 44px; }
    .pa-list-item:last-child { border-bottom: none; }
    .pa-empty { color: var(--au-fg-soft); font-style: italic; margin: 4px 0; }
    /* Reversed (estornado) log entry */
    .pa-reversed { opacity: 0.55; }
    .pa-reversed strong, .pa-reversed .pa-num { text-decoration: line-through; }
    /* Date header inside an operação log (Fornadas/Vendas) */
    .pa-daygroup { list-style: none; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--au-fg-soft); padding: 12px 4px 2px; }
    .pa-daygroup:first-child { padding-top: 2px; }
    /* Search + month scope row on the operação logs */
    .pa-row.pa-logfilters { margin: 0 0 10px; flex-wrap: nowrap; }
    .pa-logfilters .pa-search { width: auto; margin: 0; flex: 1 1 auto; }
    .pa-logfilters input[type="month"] { flex: 0 0 auto; }
    .pa-status { margin: 10px 0 0; font-size: 0.88rem; color: var(--au-fg-soft); }

    /* Bottom tab bar (iOS-native) */
    .pa-bottomnav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%;
      max-width: 640px; display: flex; background: var(--au-surface); border-top: 1px solid var(--au-border);
      box-shadow: 0 -1px 6px rgba(60, 40, 30, 0.06); padding-bottom: env(safe-area-inset-bottom); z-index: 10; }
    .pa-navbtn { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 2px 5px; border: none; background: none; color: var(--au-fg-soft); cursor: pointer; font: inherit; }
    .pa-navbtn.active { color: var(--au-action); background: #f6e9e1; }
    .pa-navbtn.active::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 36px; height: 3px; border-radius: 0 0 3px 3px; background: var(--au-action); }
    .pa-navico { font-size: 1.25rem; line-height: 1; }
    .pa-navlbl { font-size: 0.66rem; letter-spacing: 0.01em; }
    .pa-navbtn.active .pa-navlbl { font-weight: 700; }

    /* Segmented sub-nav (within a section) */
    .pa-seg { display: flex; gap: 6px; margin: 0 0 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .pa-segbtn { flex: 0 0 auto; font: inherit; font-size: 0.9rem; padding: 6px 14px; border: 1px solid var(--au-border);
      border-radius: 999px; background: var(--au-surface); color: var(--au-fg-soft); cursor: pointer; }
    .pa-segbtn.active { background: var(--au-action); color: var(--au-action-fg); border-color: var(--au-action); font-weight: 600; }

    /* Misc layout */
    .pa-grow { flex: 1 1 auto; min-width: 0; }
    .pa-muted { color: var(--au-fg-soft); font-size: 0.86rem; }
    .pa-narrow { flex: 0 0 auto; width: 7.5em; }
    input[type="date"].pa-narrow { width: 9.5em; }  /* native date control needs more room — pa-narrow clips the year */
    .pa-hint { color: var(--au-fg-soft); font-size: 0.8rem; margin: 8px 0 0; }
    .pa-h3 { font-size: 1rem; margin: 18px 0 8px; color: var(--au-fg-soft); }
    .pa-lab { color: var(--au-fg-soft); font-size: 0.88rem; }
    .pa-form { flex-wrap: wrap; }

    .pa-sub-card { border: 1px solid var(--au-border); border-radius: 10px; padding: 12px; margin: 0 0 10px; background: #fffdfb;
      content-visibility: auto; contain-intrinsic-size: auto 200px; }
    .pa-list.pa-tight .pa-list-item { padding: 6px 2px; }

    .pa-field { display: flex; flex-direction: column; gap: 4px; margin: 0 0 12px; }
    .pa-field label { font-size: 0.88rem; color: var(--au-fg-soft); }
    .pa-field .pa-input { width: 100%; }

    /* Price breakdown */
    .pa-price { font-size: 1.2rem; font-weight: 700; color: var(--au-action); }
    .pa-kv { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.92rem; }
    .pa-kv td { padding: 4px 0; border-bottom: 1px solid var(--au-border); color: var(--au-fg-soft); }
    .pa-kv td.pa-num { text-align: right; font-variant-numeric: tabular-nums; color: var(--au-fg); }
    .pa-kv-total td { font-weight: 600; color: var(--au-fg); }
    .pa-kv tr:last-child td { border-bottom: none; }
    .pa-kv-sec td { padding-top: 10px; color: var(--au-action); font-weight: 700; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: none; }
    .pa-h3row { align-items: baseline; gap: 6px; }
    .pa-chip { flex: 0 0 auto; padding: 3px 10px; border-radius: 999px; border: 1px solid var(--au-border); background: #fff; color: var(--au-fg-soft); font-size: 0.78rem; }
    .pa-chip-on { background: var(--au-action); color: #fff; border-color: var(--au-action); }
    .pa-fichas { margin-top: 16px; border-top: 1px solid var(--au-border); padding-top: 6px; }
    .pa-fichas .pa-row { flex-wrap: wrap; gap: 8px; }
    .pa-logo-preview { display: flex; align-items: center; min-height: 56px; padding: 6px 0; }
    .pa-logo-img { max-height: 64px; max-width: 70%; object-fit: contain; }
    /* Rev 07: encomendas hub — filters, urgente, entregue */
    .pa-chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
    .pa-cli-chip { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--au-border); border-radius: 10px; background: #fff; }
    .pa-enc-title { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .pa-enc-actions { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .pa-badge.pa-urg { background: #f6d9c9; color: #9a3a1f; font-weight: 700; }
    .pa-urgente { border-left: 3px solid var(--au-action); }
    .pa-row-done { opacity: 0.72; }
    .pa-urg-btn { font-size: 1.05rem; line-height: 1; padding: 4px 8px; }
    .pa-ent { flex: 0 0 auto; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--au-border); background: #fff; color: var(--au-fg-soft); font-size: 0.8rem; }
    .pa-ent-on { background: #2e7330; border-color: #2e7330; color: #fff; }
    .pa-pag-cli { display: flex; flex-direction: column; gap: 2px; padding: 10px 12px; background: var(--au-bg); border-radius: 10px; margin-bottom: 4px; }
    .pa-pag-cli strong { font-size: 1.15rem; color: var(--au-action); }
    .pa-ficha-prev { display: flex; flex-direction: column; gap: 8px; }
    .pa-ficha-card { border: 1px solid var(--au-border); border-radius: 10px; padding: 9px 11px; background: #fff; }
    .pa-num.pa-strong { color: var(--au-action); font-weight: 700; }

    .pa-totals { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--au-border); }
    .pa-bad { color: #b3261e; }
    .pa-badge.pa-bad { background: #fbe3e1; color: #b3261e; }
    .pa-badge.pa-warn { background: #f6e6c9; color: #9a6b2f; }

    /* Encomenda line item (qty · name+linetotal · R$ unit · remove) + product search-to-add */
    .pa-encitem { gap: 6px; }
    .pa-encitem .pa-qty { width: 44px; flex: 0 0 auto; text-align: center; padding: 7px 4px; }
    .pa-encitem .pa-unit { width: 76px; flex: 0 0 auto; padding: 7px 6px; }
    .pa-encitem .pa-grow { min-width: 0; }
    .pa-encitem .pa-grow > div:first-child { overflow: hidden; text-overflow: ellipsis; }
    .pa-linetot { font-size: 0.8rem; }
    .pa-suggest { background: #fffdfb; border: 1px solid var(--au-border); border-radius: 10px; margin: 6px 0 0; }
    .pa-suggest .pa-row-item { padding: 9px 11px; }
    .pa-add { color: var(--au-action); font-size: 1.35rem; font-weight: 700; line-height: 1; flex: 0 0 auto; }
    .pa-check { display: flex; align-items: center; gap: 8px; margin: 8px 2px; }
    .pa-check input { width: 20px; height: 20px; }

    /* Rev 04: comanda do dia (production table) */
    .pa-comanda { width: 100%; border-collapse: collapse; margin: 6px 0 4px; }
    .pa-comanda th { text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.03em;
      color: var(--au-fg-soft); font-weight: 600; padding: 4px 6px; border-bottom: 1px solid var(--au-border); }
    .pa-comanda th.pa-num { text-align: right; } .pa-comanda th.pa-center { text-align: center; }
    .pa-comanda td { padding: 7px 6px; border-bottom: 1px solid var(--au-border); vertical-align: middle; }
    .pa-comanda td.pa-center { text-align: center; }
    .pa-comanda td.pa-prev { color: var(--au-fg-soft); white-space: nowrap; }
    .pa-comanda .pa-qty { width: 56px; text-align: center; padding: 6px 4px; }
    .pa-comanda input[type=checkbox] { width: 22px; height: 22px; }
    .pa-comanda tr.pa-done td:first-child div:first-child { color: var(--au-fg-soft); }
    .pa-exced { display: block; font-size: 0.74rem; color: var(--au-fg-soft); }
    .pa-comanda-ind { margin-top: 10px; }
    /* Rev 07: comanda as a card per product (full labels, aligned fields) */
    .pa-cmd-list { display: flex; flex-direction: column; gap: 8px; margin: 6px 0 4px; }
    .pa-cmd-item { border: 1px solid var(--au-border); border-radius: 12px; padding: 10px 12px; background: #fff; }
    .pa-cmd-item.pa-done { background: #f6faf4; }
    .pa-cmd-head { display: flex; align-items: center; gap: 8px; }
    .pa-cmd-fields { display: flex; flex-wrap: wrap; gap: 10px 14px; margin: 8px 0 2px; }
    .pa-cmd-field { display: flex; flex-direction: column; gap: 3px; }
    .pa-cmd-field > span { font-size: 0.7rem; color: var(--au-fg-soft); }
    .pa-cmd-field .pa-qty { width: 92px; text-align: center; }
    .pa-cmd-feito { display: flex; align-items: center; gap: 6px; align-self: flex-end; padding-bottom: 7px; }
    .pa-cmd-feito input { width: 22px; height: 22px; }

    /* Lote 1: search, edit, history, observação */
    .pa-search { width: 100%; margin: 0 0 10px; }
    .pa-list-item.pa-stack { display: block; }
    .pa-editing { background: #fffaf3; border: 1px solid var(--au-action); }
    .pa-cardfoot { margin-top: 10px; justify-content: flex-end; }
    .pa-history { margin: 4px 0 0; }
    .pa-history summary { cursor: pointer; color: var(--au-fg-soft); font-size: 0.8rem; }
    .pa-history .pa-list-item { padding: 3px 0; }
    .pa-obs { white-space: pre-wrap; font-size: 0.88rem; color: var(--au-fg-soft); font-style: italic;
      margin: 2px 0 8px; padding-left: 8px; border-left: 2px solid var(--au-border); }
    textarea.pa-textarea { width: 100%; resize: vertical; font: inherit; min-height: 60px; }

    /* Cadastro lists: header with add button, clean tappable rows */
    .pa-cardhead { display: flex; align-items: center; gap: 8px; margin: 0 0 14px; }
    .pa-rows { margin: 0; }
    .pa-row-item { display: flex; align-items: center; gap: 8px; padding: 12px 4px; border-bottom: 1px solid var(--au-border); cursor: pointer;
      content-visibility: auto; contain-intrinsic-size: auto 64px; }
    .pa-row-item:last-child { border-bottom: none; }
    .pa-row-item:active { background: #faf3ec; }
    .pa-row-item .pa-muted { font-size: 0.85rem; }
    .pa-chev { color: var(--au-fg-soft); font-size: 1.4rem; line-height: 1; flex: 0 0 auto; }
    /* Tags (etiquetas) */
    .pa-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .pa-tag { font-size: 0.72rem; padding: 1px 8px; border-radius: 999px; background: #f0e3d8; color: var(--au-action); }
    /* "Tap to edit" discoverability hint */
    .pa-tap { margin: 0 0 8px; font-style: italic; }

    /* Currency input */
    .pa-money { display: flex; align-items: stretch; border: 1px solid var(--au-border); border-radius: 10px;
      background: var(--au-surface); overflow: hidden; }
    .pa-money:focus-within { border-color: var(--au-action); }
    .pa-money-pfx { display: flex; align-items: center; padding: 0 10px; background: #f6efe8; color: var(--au-fg-soft); font-size: 0.95rem; }
    .pa-money-input { flex: 1; min-width: 0; border: none; background: none; font: inherit; padding: 9px 11px; color: var(--au-fg); }
    .pa-money-input:focus { outline: none; }

    /* Bottom sheet / modal */
    .pa-backdrop { position: fixed; inset: 0; background: rgba(40, 26, 18, 0.45); z-index: 100;
      display: flex; align-items: flex-end; justify-content: center; }
    .pa-sheet { width: 100%; max-width: 640px; background: var(--au-surface); border-radius: 18px 18px 0 0;
      padding: 8px 18px calc(18px + env(safe-area-inset-bottom)); max-height: 88vh; overflow-y: auto;
      box-shadow: 0 -4px 24px rgba(40, 26, 18, 0.18); animation: pa-sheet-up 0.18s ease-out; }
    @keyframes pa-sheet-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .pa-sheet-grab { width: 40px; height: 4px; border-radius: 999px; background: var(--au-border); margin: 4px auto 10px; }
    .pa-sheet-title { margin: 0 0 14px; font-size: 1.2rem; }
    .pa-sheet-msg { color: var(--au-fg-soft); margin: 0 0 18px; }
    .pa-sheet-body .pa-field:last-child { margin-bottom: 6px; }
    .pa-sheet-actions { display: flex; gap: 10px; margin-top: 4px; }
    .pa-sheet-danger { width: 100%; margin-top: 14px; }
    .pa-danger-btn { background: #b3261e; color: #fff; border-color: #b3261e; }

    /* Simulador (what-if) */
    .pa-sim td:nth-child(2), .pa-sim td:nth-child(3) { width: 28%; }
    .pa-sim .pa-sim-head td { color: var(--au-fg-soft); font-size: 0.82rem; border-bottom: 1px solid var(--au-border); }
    .pa-sim .pa-strong { color: var(--au-action); }

    /* Lote 2: Relatórios */
    .pa-chart { display: block; width: 100%; height: auto; margin: 6px 0 10px; }
    .pa-report td:first-child { color: var(--au-fg); }
    .pa-report td.pa-num { font-variant-numeric: tabular-nums; }

    /* 2026 brand refresh — clearer hierarchy, roomier controls and the Paiol color system. */
    :root {
      --pa-navy: #3d526f;
      --pa-teal: #0f7881;
      --pa-olive: #687456;
      --pa-gold: #c58b32;
      --pa-terra: #a94f31;
      --pa-wine: #853f50;
      --au-bg: #f4f3ef;
      --au-surface: #ffffff;
      --au-fg: #24313f;
      --au-fg-soft: #68717a;
      --au-border: #dfe3e4;
      --au-action: var(--pa-navy);
      --au-action-fg: #ffffff;
      --au-ok: #347160;
      --au-radius: 18px;
      --au-shadow: 0 10px 30px rgba(39, 58, 75, 0.08);
    }
    html, body { background: var(--au-bg); color: var(--au-fg); font-family: "Segoe UI", Inter, system-ui, sans-serif; }
    body { min-height: 100vh; }
    #app { max-width: none; padding: 0 14px calc(84px + env(safe-area-inset-bottom)); }
    .pa-main { width: 100%; max-width: 920px; margin: 0 auto; }

    .pa-header { position: relative; margin: 0 -14px 18px; padding: 20px 18px 15px; background: rgba(255,255,255,.94); border-bottom: 1px solid var(--au-border); align-items: center; }
    .pa-header::before { content: ''; position: absolute; inset: 0 0 auto; height: 5px; background: linear-gradient(90deg, var(--pa-navy) 0 17%, var(--pa-teal) 17% 34%, var(--pa-olive) 34% 51%, var(--pa-gold) 51% 68%, var(--pa-terra) 68% 84%, var(--pa-wine) 84%); }
    .pa-brand { display: flex; align-items: center; gap: 14px; }
    .pa-brand-logo { width: 158px; height: 78px; object-fit: contain; object-position: left center; }
    .pa-brand-copy { display: none; }
    .pa-eyebrow { display: block; color: var(--pa-teal); font-size: .69rem; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; margin-bottom: 2px; }
    .pa-header h1 { color: var(--pa-navy); font-family: Georgia, "Times New Roman", serif; font-size: 1.35rem; }
    .pa-beta { color: var(--pa-terra); background: #f9ece7; border-color: #e5b8a8; }
    .pa-help-btn { border-color: #ccd5da; color: var(--pa-navy); box-shadow: none; }

    .pa-card { border-color: #e2e6e7; border-radius: var(--au-radius); box-shadow: var(--au-shadow); padding: 18px; margin-bottom: 18px; }
    .pa-card h2 { margin: 0; color: var(--pa-navy); font-size: 1.28rem; letter-spacing: -.015em; }
    .pa-h3 { color: var(--pa-navy); font-size: .96rem; }
    .pa-hint { font-size: .84rem; line-height: 1.55; }
    .pa-cardhead { align-items: flex-start; flex-wrap: wrap; }
